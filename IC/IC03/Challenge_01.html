<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 1 - Animating the Fraction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 80px;
        }

        #question {
            display: inline-block;
            font-size: 40px;
            /* Smooth transform transition over 0.6s with ease-in-out */
            transition: transform 0.6s ease-in-out;
        }

        #question:hover {
            /* Shrink the question slightly on hover */
            transform: scale(0.9);
        }

        #equals {
            font-size: 40px;
        }

        #answer {
            display: inline-block;
            font-size: 40px;
            font-weight: bold;
            /* Start moveFraction 1s after load, run for 2s, keep final state */
            animation-name: moveFraction;
            animation-duration: 2s;
            animation-delay: 1s;
            animation-fill-mode: forwards;
        }

        @keyframes moveFraction {
            0% {
                color: yellow;
                transform: translate(-355px, 60px);
            }
            50% {
                transform: translate(0px, 60px);
            }
            100% {
                color: red;
                transform: translate(0px, 0px);
            }
        }
    </style>
</head>
<body>
    <span id="question">What is 1/2 + 1/4?</span>
    <span id="equals">=</span>
    <span id="answer">3/4</span>
</body>
</html>
