<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 2 - I &hearts; NY T-Shirt</title>
    <style>
        .container {
            background-color: #f4f4f4;
            display: inline-block;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        img {
            position: relative;
            left: 10px;
            border: 4px solid black;
            padding: 10px;
            margin: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            display: block;
        }

        .logo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            white-space: nowrap;
            width: 160px;
        }

        .words {
            font-family: Impact, sans-serif;
            font-size: 60px;
            font-weight: bold;
            display: inline-block;
            vertical-align: middle;
        }

        .heart {
            color: red;
            font-size: 70px;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        .last {
            display: block;
            margin-top: -10px;
        }
    </style>
</head>
<body>
    <div class="container"></div>
        <div class="logo-text">
            <span class="first words">I</span>
            <span class="heart">&hearts;</span>
            <span class="last words">NY</span>
        </div>

        <div>
            <img src="images/white-tshirt.png" alt="White t-shirt">
        </div>
    </div>
</body>
</html>
